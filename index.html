<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Stats preview card component</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="stats-card">

    <div class="image">
      <picture>
        <source media="(min-width: 900px)" srcset="images/image-header-desktop.jpg">
        <img src="images/image-header-mobile.jpg" alt="Workplace image">
      </picture>
      <div class="overlay"></div>
    </div>

    <div class="text">
      <h1>Get <span class='insights'>insights</span> that help your business grow.</h1>
      <p class="description">
        Discover the benefits of data analytics and make better decisions regarding revenue, customer
        experience, and overall efficiency.
      </p>
      <div class="stats">
        <div class="box">
          <span class="numbers">10k+</span>
          <h2>companies</h2>
        </div>
        <div class="box">
          <span class="numbers">314</span>
          <h2>templates</h2>
        </div>
        <div class="box">
          <span class="numbers">12M+</span>
          <h2>queries</h2>
        </div>
      </div>
    </div>

  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="https://www.frontendmentor.io/profile/fernandolapaz">Fernando</a>.
  </footer>

</body>

</html>
